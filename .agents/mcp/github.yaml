server_id: github
name: GitHub MCP
description: GitHub 官方 MCP server，只读暴露仓库、Issue、PR、Actions 与安全相关上下文。
enabled: true
transport:
  type: stdio
  command: github-mcp-server
  args:
    - stdio
    - --read-only
    - --toolsets
    - context,repos,issues,pull_requests,actions,code_security,dependabot,secret_protection
  env:
    GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}
related_skills:
  - digagent-runtime
required_env:
  - GITHUB_PERSONAL_ACCESS_TOKEN
default_risk_tags:
  - network
