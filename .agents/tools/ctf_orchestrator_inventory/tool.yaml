name: ctf_orchestrator_inventory
description: Inspect the bundled CTF sandbox orchestrator plugin assets and return a JSON inventory.
version: 1
entry: plugin_command
args_schema:
  type: object
  properties:
    argv:
      type: array
      items:
        type: string
output_schema:
  type: object
  properties:
    command_name:
      type: string
    plugin_id:
      type: string
    exit_code:
      type: integer
    output:
      type: string
risk_tags:
  - shell_exec
timeout_sec: 60
env_policy: inherit
working_dir: .
interrupt_on_call: true
memory_hooks: {}
report_hooks: {}
metadata:
  plugin_id: ctf-sandbox-orchestrator
  command_name: ctf_orchestrator_inventory
