name: cve_search_local
description: Search cached CVE and KEV intelligence from the local store.
version: 1
function: run
args_schema:
  type: object
  properties:
    query:
      type: string
    cve_id:
      type: string
    cwe:
      type: string
    product:
      type: string
    kev_only:
      type: boolean
    limit:
      type: integer
output_schema:
  type: array
  items:
    type: object
risk_tags: []
timeout_sec: 15
env_policy: inherit
working_dir: .
interrupt_on_call: false
memory_hooks: {}
report_hooks: {}
