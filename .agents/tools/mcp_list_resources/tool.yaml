name: mcp_list_resources
description: List read-only resources exposed by a configured MCP server.
version: 1
entry: mcp_list_resources
args_schema:
  type: object
  properties:
    server_name:
      type: string
  required: [server_name]
output_schema:
  type: object
  properties:
    resources:
      type: array
      items:
        type: object
risk_tags: []
timeout_sec: 15
env_policy: inherit
working_dir: .
interrupt_on_call: false
memory_hooks: {}
report_hooks: {}
metadata: {}
