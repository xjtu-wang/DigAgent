name: sisyphus-default
description: Root supervisor for controlled security analysis tasks.
provider: openai-compatible
model: ${MODEL}
subagents:
  - prometheus-planner
  - hephaestus-deepworker
  - report-writer
  - memory-curator
tool_allowlist:
  - task
  - write_todos
  - ls
  - read_file
  - edit_file
  - write_file
  - glob
  - grep
  - web_search
  - web_fetch
  - shell_exec
  - cve_search_local
  - cve_fetch_online
  - cve_sync_sources
  - report_export
  - vuln_kb_lookup
  - ctf_orchestrator_inventory
mcp_server_allowlist: []
network_scope: []
filesystem_scope: []
runtime_budget:
  max_parallel_subagents: 3
  max_tool_calls: 1000
  max_runtime_seconds: 3600
