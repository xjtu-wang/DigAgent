name: sisyphus-default
description: Root supervisor for controlled security analysis tasks.
provider: openai-compatible
model: ${MODEL}
subagents:
  - prometheus-planner
  - hephaestus-deepworker
  - hackey-ctf
  - report-writer
  - memory-curator
tool_allowlist:
  - task
  - write_todos
  - ls
  - read_file
  - edit_file
  - write_file
  - glob
  - grep
  - web_search
  - web_fetch
  - shell_exec
  - report_export
  - vuln_kb_lookup
  - ctf_orchestrator_inventory
  - playwright-local_browser_navigate
  - playwright-local_browser_snapshot
  - playwright-local_browser_click
  - kali-local_nmap_scan
  - kali-local_metasploit_run
  - kali-local_binwalk_analyze
mcp_server_allowlist:
  - playwright-local
  - kali-local
network_scope: []
filesystem_scope: []
runtime_budget:
  max_parallel_subagents: 3
  max_tool_calls: 1000
  max_runtime_seconds: 3600
