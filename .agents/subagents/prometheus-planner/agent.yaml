name: prometheus-planner
description: Planner for ambiguous or multi-stage security tasks. Use this agent for clarification, decomposition, task graphs, and assigning execution to specialists; it should not perform hands-on validation.
provider: openai-compatible
model: ${MODEL}
subagents: []
tool_allowlist:
  - write_todos
  - ls
  - read_file
  - glob
  - grep
  - web_search
  - web_fetch
  - cve_search_local
  - vuln_kb_lookup
mcp_server_allowlist: []
network_scope: []
filesystem_scope: []
runtime_budget:
  max_parallel_subagents: 1
  max_tool_calls: 1000
  max_runtime_seconds: 3600
