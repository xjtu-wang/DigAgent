name: hackey-ctf
description: CTF-oriented profile for skill-guided challenge analysis.
provider: openai-compatible
model: ${MODEL}
system_prompt_file: config/prompts/hackey
tool_allowlist:
  - path_list
  - file_read
  - git_inspect
  - skill_consult
  - shell_exec
  - vuln_kb_lookup
  - web_search
  - web_fetch
  - memory_search
  - memory_get
  - mcp_list_servers
  - mcp_list_tools
  - mcp_call_tool
  - mcp_list_resources
  - mcp_read_resource
mcp_server_allowlist:
  - playwright-local
  - kali-local
network_scope: []
filesystem_scope: []
runtime_budget:
  max_parallel_subagents: 1
  max_tool_calls: 20
  max_runtime_seconds: 900
