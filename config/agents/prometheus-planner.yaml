name: prometheus-planner
description: Planning-focused agent for ambiguous tasks.
provider: openai-compatible
model: ${MODEL}
system_prompt_file: config/prompts/prometheus
tool_allowlist:
  - path_list
  - file_read
  - git_inspect
  - repo_search
  - web_search
  - web_fetch
  - skill_consult
  - vuln_kb_lookup
  - memory_search
  - memory_get
  - mcp_list_servers
  - mcp_list_tools
  - mcp_call_tool
  - mcp_list_resources
  - mcp_read_resource
mcp_server_allowlist:
  - playwright-local
  - kali-local
network_scope: []
filesystem_scope: []
runtime_budget:
  max_parallel_subagents: 1
  max_tool_calls: 1000
  max_runtime_seconds: 3600
