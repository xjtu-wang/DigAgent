name: prometheus-planner
description: Planning-focused agent for ambiguous tasks.
provider: openai-compatible
model: ${MODEL}
system_prompt_file: config/prompts/prometheus.md
tool_allowlist:
  - repo_search
  - skill_consult
  - vuln_kb_lookup
  - memory_search
  - memory_get
network_scope: []
filesystem_scope: []
runtime_budget:
  max_parallel_subagents: 1
  max_tool_calls: 10
  max_runtime_seconds: 600
